name: Collect Realtime Facility Status

on:
  schedule:
    - cron: '0 20-23 * * *'  # Every hour during Seoul Metro operating hours (05:00~00:59 KST, UTC+9)
    - cron: '0 0-15 * * *'   # Continued from above (cron doesn't support wrap-around ranges)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Collect all realtime facilities
        env:
          SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
        run: node collect.js --all-realtime
        working-directory: scripts

      - name: Build latest.json
        run: node build-latest.js
        working-directory: scripts

      - name: Create pull request with data
        id: cpr
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7
        with:
          commit-message: 'chore: collect realtime data'
          branch: auto/collect-realtime
          title: 'chore: collect realtime data'
          body: 'Automated realtime facility data collection.'
          add-paths: |
            data/realtime/**
            web/public/data/**

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --auto --squash
