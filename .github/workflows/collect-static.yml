name: Collect Static Facility Info

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  collect-static:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Collect static facilities
        env:
          SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
        run: node collect-static.js
        working-directory: scripts

      - name: Build latest.json
        run: node build-latest.js || echo "Skipped (no realtime data yet)"
        working-directory: scripts

      - name: Create pull request with data
        id: cpr
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7
        with:
          commit-message: 'chore: update static facility data'
          branch: auto/collect-static
          title: 'chore: update static facility data'
          body: 'Automated static facility data collection.'
          add-paths: |
            data-static/**
            web/public/data/**

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: gh pr merge "$PR_NUMBER" --auto --squash
